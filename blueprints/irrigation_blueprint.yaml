# ============================================================
# BLUEPRINT — Terrace Irrigation System
# ============================================================
# Installation:
#   1. Copy this file to:
#      config/blueprints/automation/irrigazione_terrazzo.yaml
#   2. Restart Home Assistant or reload blueprints
#   3. Go to Settings → Automations → Create Automation
#      → From blueprint → "Terrace Irrigation System"
#   4. Fill the form for each terrace and save
# ============================================================

blueprint:
  name: "Terrace Irrigation System"
  description: >
    Automatic irrigation based on a weighted average of two
    moisture sensors (small and large pots). Includes vacation mode,
    post-irrigation cooldown, manual pause and push notifications.
  domain: automation
  author: "Thomas"

  input:
    # --- Sensors ---
    small_pot_sensor:
      name: "Moisture sensor — small pots"
      description: "Zigbee moisture sensor placed in a representative small pot"
      selector:
        entity:
          domain: sensor
          device_class: moisture

    large_pot_sensor:
      name: "Moisture sensor — large pots"
      description: "Zigbee moisture sensor placed in a representative large pot"
      selector:
        entity:
          domain: sensor
          device_class: moisture

    # --- Valve ---
    irrigation_valve:
      name: "Irrigation valve"
      description: "Switch that controls the water flow"
      selector:
        entity:
          domain: switch

    # --- Weights and thresholds ---
    small_pot_weight:
      name: "Small pots weight"
      description: "Priority of small pots in the calculation (0.0 = only large, 1.0 = only small)"
      default: 0.7
      selector:
        number:
          min: 0.0
          max: 1.0
          step: 0.05
          mode: slider

    normal_threshold:
      name: "Normal irrigation threshold (%)"
      description: "Weighted humidity below which irrigation starts"
      default: 40
      selector:
        number:
          min: 20
          max: 60
          step: 5
          unit_of_measurement: "%"
          mode: slider

    normal_duration:
      name: "Normal irrigation duration (minutes)"
      default: 5
      selector:
        number:
          min: 1
          max: 20
          step: 1
          unit_of_measurement: "min"
          mode: slider

    # --- Time window ---
    start_mode:
      name: "Start mode"
      default: "time"
      selector:
        select:
          options:
            - label: "Fixed time"
              value: "time"
            - label: "Sunrise"
              value: "sunrise"
            - label: "Sunset"
              value: "sunset"

    start_fixed_time:
      name: "Start time"
      default: "06:00:00"
      selector:
        time:

    start_sun_offset:
      name: "Start sun offset (minutes)"
      default: 0
      selector:
        number:
          min: -120
          max: 120
          step: 5
          unit_of_measurement: "min"
          mode: slider

    end_mode:
      name: "End mode"
      default: "time"
      selector:
        select:
          options:
            - label: "Fixed time"
              value: "time"
            - label: "Sunrise"
              value: "sunrise"
            - label: "Sunset"
              value: "sunset"

    end_time:
      name: "End time"
      default: "09:00:00"
      selector:
        time:

    end_sun_offset:
      name: "End sun offset (minutes)"
      default: 0
      selector:
        number:
          min: -120
          max: 120
          step: 5
          unit_of_measurement: "min"
          mode: slider

    # --- Cooldown ---
    cooldown_minutes:
      name: "Post-irrigation cooldown (minutes)"
      description: "Wait after each cycle to allow absorption"
      default: 30
      selector:
        number:
          min: 10
          max: 60
          step: 5
          unit_of_measurement: "min"
          mode: slider

    # --- Vacation mode ---
    vacation_threshold:
      name: "Vacation irrigation threshold (%)"
      description: "Higher threshold to intervene earlier when you're away"
      default: 50
      selector:
        number:
          min: 20
          max: 60
          step: 5
          unit_of_measurement: "%"
          mode: slider

    vacation_irrigation_duration:
      name: "Vacation irrigation duration (minutes)"
      default: 8
      selector:
        number:
          min: 1
          max: 20
          step: 1
          unit_of_measurement: "min"
          mode: slider

    # --- Boolean helpers ---
    irrigation_pause:
      name: "Helper — Irrigation pause"
      description: "input_boolean for manual pause (create a dedicated helper for this terrace)"
      selector:
        entity:
          domain: input_boolean

    vacation_mode:
      name: "Helper — Vacation mode"
      description: "input_boolean for vacation mode (create a dedicated helper for this terrace)"
      selector:
        entity:
          domain: input_boolean

    # --- Retry ---
    retry_wait_seconds:
      name: "Retry wait (seconds)"
      description: >
        Seconds to wait after the open command before checking
        if the valve responded. If still off, one retry is sent.
        Recommended: 10
      default: 10
      selector:
        number:
          min: 5
          max: 30
          step: 5
          unit_of_measurement: "s"
          mode: slider

    # --- Notifications ---
    notification_device:
      name: "Notification device"
      description: "Mobile app device that receives post-irrigation warnings"
      selector:
        device:
          filter:
            - integration: mobile_app

    notify_on_start:
      name: "Notify irrigation start"
      default: false
      selector:
        boolean:

    notify_on_stop:
      name: "Notify irrigation stop"
      default: false
      selector:
        boolean:

# ============================================================
# AUTOMATION LOGIC
# ============================================================

variables:
  small_pot_sensor: !input small_pot_sensor
  large_pot_sensor:  !input large_pot_sensor
  weight:            !input small_pot_weight
  normal_threshold:     !input normal_threshold
  vacation_threshold:      !input vacation_threshold
  vacation_mode:   !input vacation_mode
  normal_duration: !input normal_duration
  vacation_irrigation_duration: !input vacation_irrigation_duration
  start_mode: !input start_mode
  start_fixed_time: !input start_fixed_time
  start_sun_offset: !input start_sun_offset
  end_mode: !input end_mode
  end_time: !input end_time
  end_sun_offset: !input end_sun_offset
  notify_on_start: !input notify_on_start
  notify_on_stop: !input notify_on_stop

trigger:
  - platform: template
    value_template: >
      {% set small = states(small_pot_sensor) | float(0) %}
      {% set large  = states(large_pot_sensor)  | float(0) %}
      {% set moisture = (small * weight + large * (1 - weight)) | round(1) %}
      {% if is_state(vacation_mode, 'on') %}
        {% set threshold = vacation_threshold | float(50) %}
      {% else %}
        {% set threshold = normal_threshold | float(40) %}
      {% endif %}
      {% set start_offset = timedelta(minutes=start_sun_offset | int(0)) %}
      {% if start_mode == 'sunrise' %}
        {% set next_sun = as_local(as_datetime(state_attr('sun.sun', 'next_rising'))) %}
        {% set start = next_sun + start_offset if is_state('sun.sun', 'below_horizon') else next_sun - timedelta(days=1) + start_offset %}
      {% elif start_mode == 'sunset' %}
        {% set next_sun = as_local(as_datetime(state_attr('sun.sun', 'next_setting'))) %}
        {% set start = next_sun + start_offset if is_state('sun.sun', 'above_horizon') else next_sun - timedelta(days=1) + start_offset %}
      {% else %}
        {% set start = today_at(start_fixed_time) %}
      {% endif %}
      {% set end_offset = timedelta(minutes=end_sun_offset | int(0)) %}
      {% if end_mode == 'sunrise' %}
        {% set next_sun = as_local(as_datetime(state_attr('sun.sun', 'next_rising'))) %}
        {% set end = next_sun + end_offset if is_state('sun.sun', 'below_horizon') else next_sun - timedelta(days=1) + end_offset %}
      {% elif end_mode == 'sunset' %}
        {% set next_sun = as_local(as_datetime(state_attr('sun.sun', 'next_setting'))) %}
        {% set end = next_sun + end_offset if is_state('sun.sun', 'above_horizon') else next_sun - timedelta(days=1) + end_offset %}
      {% else %}
        {% set end = today_at(end_time) %}
      {% endif %}
      {% set end = end + timedelta(days=1) if end <= start else end %}
      {% set yesterday_start = start - timedelta(days=1) %}
      {% set yesterday_end = end - timedelta(days=1) %}
      {{ moisture < threshold and ((now() >= start and now() <= end) or (now() >= yesterday_start and now() <= yesterday_end)) }}
    for:
      minutes: 5

condition:
  - condition: state
    entity_id: !input irrigation_pause
    state: "off"
  - condition: state
    entity_id: !input irrigation_valve
    state: "off"
  - condition: template
    value_template: >
      {% set start_offset = timedelta(minutes=start_sun_offset | int(0)) %}
      {% if start_mode == 'sunrise' %}
        {% set next_sun = as_local(as_datetime(state_attr('sun.sun', 'next_rising'))) %}
        {% set start = next_sun + start_offset if is_state('sun.sun', 'below_horizon') else next_sun - timedelta(days=1) + start_offset %}
      {% elif start_mode == 'sunset' %}
        {% set next_sun = as_local(as_datetime(state_attr('sun.sun', 'next_setting'))) %}
        {% set start = next_sun + start_offset if is_state('sun.sun', 'above_horizon') else next_sun - timedelta(days=1) + start_offset %}
      {% else %}
        {% set start = today_at(start_fixed_time) %}
      {% endif %}
      {% set end_offset = timedelta(minutes=end_sun_offset | int(0)) %}
      {% if end_mode == 'sunrise' %}
        {% set next_sun = as_local(as_datetime(state_attr('sun.sun', 'next_rising'))) %}
        {% set end = next_sun + end_offset if is_state('sun.sun', 'below_horizon') else next_sun - timedelta(days=1) + end_offset %}
      {% elif end_mode == 'sunset' %}
        {% set next_sun = as_local(as_datetime(state_attr('sun.sun', 'next_setting'))) %}
        {% set end = next_sun + end_offset if is_state('sun.sun', 'above_horizon') else next_sun - timedelta(days=1) + end_offset %}
      {% else %}
        {% set end = today_at(end_time) %}
      {% endif %}
      {% set end = end + timedelta(days=1) if end <= start else end %}
      {% set yesterday_start = start - timedelta(days=1) %}
      {% set yesterday_end = end - timedelta(days=1) %}
      {{ (now() >= start and now() <= end) or (now() >= yesterday_start and now() <= yesterday_end) }}

action:
  # Calculate duration based on mode
  - variables:
      duration: >
        {% if is_state(vacation_mode, 'on') %}
          {{ vacation_irrigation_duration | int(8) }}
        {% else %}
          {{ normal_duration | int(5) }}
        {% endif %}
      current_moisture: >
        {% set small = states(small_pot_sensor) | float(0) %}
        {% set large  = states(large_pot_sensor)  | float(0) %}
        {{ (small * weight + large * (1 - weight)) | round(1) }}

  # Open the valve — first attempt
  - service: switch.turn_on
    target:
      entity_id: !input irrigation_valve

  # Wait and check if valve responded (deep sleep workaround)
  - delay:
      seconds: !input retry_wait_seconds

  - if:
      - condition: state
        entity_id: !input irrigation_valve
        state: "off"
    then:
      # Second attempt
      - service: switch.turn_on
        target:
          entity_id: !input irrigation_valve

      - delay:
          seconds: !input retry_wait_seconds

      # If still off after retry → notify and abort
      - if:
          - condition: state
            entity_id: !input irrigation_valve
            state: "off"
        then:
          - device_id: !input notification_device
            domain: mobile_app
            type: notify
            title: "⚠️ Terrace — Valve error"
            message: >
              The valve did not respond after 2 attempts.
              Check the Zigbee device.
          - stop: "Valve not responding after retry"

  - if:
      - condition: template
        value_template: "{{ notify_on_start }}"
    then:
      - device_id: !input notification_device
        domain: mobile_app
        type: notify
        title: "🌱 Terrace — Irrigation started"
        message: >
          Irrigation started. Current moisture is {{ current_moisture }}%.

  # Wait the calculated duration
  - delay:
      minutes: "{{ duration }}"

  # Close the valve
  - service: switch.turn_off
    target:
      entity_id: !input irrigation_valve

  - if:
      - condition: template
        value_template: "{{ notify_on_stop }}"
    then:
      - device_id: !input notification_device
        domain: mobile_app
        type: notify
        title: "🌱 Terrace — Irrigation stopped"
        message: >
          Irrigation stopped after {{ duration }} minutes.

  # Absorption cooldown
  - delay:
      minutes: !input cooldown_minutes

  # Check if moisture still low → notify
  - variables:
      current_moisture_post: >
        {% set small = states(small_pot_sensor) | float(0) %}
        {% set large  = states(large_pot_sensor)  | float(0) %}
        {{ (small * weight + large * (1 - weight)) | round(1) }}
      active_threshold: >
        {% if is_state(vacation_mode, 'on') %}
          {{ vacation_threshold | float(50) }}
        {% else %}
          {{ normal_threshold | float(40) }}
        {% endif %}

  - if:
      - condition: template
        value_template: "{{ current_moisture_post | float(0) < active_threshold | float(0) }}"
    then:
      - device_id: !input notification_device
        domain: mobile_app
        type: notify
        title: "🌱 Terrace — Attention"
        message: >
          Moisture still at {{ current_moisture_post }}% after irrigation.
          Check pots or sensors.
mode: single