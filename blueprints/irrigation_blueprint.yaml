# ============================================================
# BLUEPRINT — Terrace Irrigation System
# ============================================================
# Installation:
#   1. Copy this file to:
#      config/blueprints/automation/irrigazione_terrazzo.yaml
#   2. Restart Home Assistant or reload blueprints
#   3. Go to Settings → Automations → Create Automation
#      → From blueprint → "Terrace Irrigation System"
#   4. Fill the form for each terrace and save
# ============================================================

blueprint:
  name: "Terrace Irrigation System"
  description: >
    Automatic irrigation based on a terrace moisture sensor.
    Triggers daily at a fixed time to check and irrigate if needed.
  domain: automation
  author: "Thomas"

  input:
    # --- Moisture ---
    moisture_sensor:
      name: "Terrace moisture sensor"
      description: "Sensor that measures soil moisture"
      selector:
        entity:
          domain: sensor
          device_class: moisture

    # --- Valve ---
    irrigation_valve:
      name: "Irrigation valve"
      description: "Switch that controls the water flow"
      selector:
        entity:
          domain: switch

    irrigation_threshold:
      name: "Irrigation threshold"
      description: "Moisture level below which irrigation starts"
      selector:
        entity:
          domain: input_number

    normal_duration:
      name: "Irrigation duration (minutes)"
      default: 5
      selector:
        number:
          min: 1
          max: 20
          step: 1
          unit_of_measurement: "min"
          mode: slider

    # --- Start time ---
    start_time:
      name: "Start time"
      default: "06:00:00"
      description: "Daily time to check and irrigate if needed"
      selector:
        time:

    # --- Boolean helpers ---
    irrigation_pause:
      name: "Helper — Irrigation pause"
      description: "input_boolean for manual pause"
      selector:
        entity:
          domain: input_boolean

    # --- Retry ---
    retry_wait_seconds:
      name: "Retry wait (seconds)"
      description: "Seconds to wait after valve command before checking response"
      default: 10
      selector:
        number:
          min: 5
          max: 30
          step: 5
          unit_of_measurement: "s"
          mode: slider

    # --- Notifications ---
    notification_device:
      name: "Notification device"
      description: "Mobile app device for notifications"
      selector:
        device:
          filter:
            - integration: mobile_app

    notify_on_start:
      name: "Notify irrigation start"
      default: false
      selector:
        boolean:

    notify_on_stop:
      name: "Notify irrigation stop"
      default: false
      selector:
        boolean:

    # --- Zone name ---
    zone_name:
      name: "Zone name"
      description: "Name of the irrigated zone (e.g., 'Front terrace', 'Back garden')"
      selector:
        text:

# ============================================================
# AUTOMATION LOGIC
# ============================================================

variables:
  moisture_sensor: !input moisture_sensor
  irrigation_threshold: !input irrigation_threshold
  normal_duration: !input normal_duration
  notify_on_start: !input notify_on_start
  notify_on_stop: !input notify_on_stop
  zone_name: !input zone_name

trigger:
  - platform: time
    at: !input start_time

condition:
  - condition: state
    entity_id: !input irrigation_pause
    state: "off"
  - condition: state
    entity_id: !input irrigation_valve
    state: "off"
  - condition: numeric_state
    entity_id: !input moisture_sensor
    below: !input irrigation_threshold

action:
  # Calculate values used by notifications
  - variables:
      duration: "{{ normal_duration | int(5) }}"
      current_moisture: >
        {{ states(moisture_sensor) | float(0) | round(1) }}

  # Open the valve — first attempt
  - service: switch.turn_on
    target:
      entity_id: !input irrigation_valve

  # Wait and check if valve responded
  - delay:
      seconds: !input retry_wait_seconds

  - if:
      - condition: state
        entity_id: !input irrigation_valve
        state: "off"
    then:
      # Second attempt
      - service: switch.turn_on
        target:
          entity_id: !input irrigation_valve

      - delay:
          seconds: !input retry_wait_seconds

      # If still off after retry → notify and abort
      - if:
          - condition: state
            entity_id: !input irrigation_valve
            state: "off"
        then:
          - device_id: !input notification_device
            domain: mobile_app
            type: notify
            title: "⚠️ {{ zone_name }} — Valve error"
            message: >
              {{ zone_name }}: The valve did not respond after 2 attempts.
              Check the Zigbee device.
          - stop: "Valve not responding after retry"

  - if:
      - condition: template
        value_template: "{{ notify_on_start }}"
    then:
      - device_id: !input notification_device
        domain: mobile_app
        type: notify
        title: "🌱 {{ zone_name }} — Irrigation started"
        message: >
          Irrigation started. Current moisture is {{ current_moisture }}%.

  # Wait the calculated duration
  - delay:
      minutes: "{{ duration }}"

  # Close the valve
  - service: switch.turn_off
    target:
      entity_id: !input irrigation_valve

  - if:
      - condition: template
        value_template: "{{ notify_on_stop }}"
    then:
      - device_id: !input notification_device
        domain: mobile_app
        type: notify
        title: "🌱 {{ zone_name }} — Irrigation stopped"
        message: >
          Irrigation stopped after {{ duration }} minutes.

mode: single
