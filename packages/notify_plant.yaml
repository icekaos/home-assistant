input_number:
  plants_threshold_ts_piccolo:
    name: Soglia sete TS piccolo
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    mode: box
    icon: mdi:water-percent
    initial: 35

  plants_threshold_ts_grande:
    name: Soglia sete TS grande
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    mode: box
    icon: mdi:water-percent
    initial: 35

  plants_threshold_tcm_piccolo:
    name: Soglia sete TCM piccolo
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    mode: box
    icon: mdi:water-percent
    initial: 35

  plants_threshold_tcm_grande:
    name: Soglia sete TCM grande
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    mode: box
    icon: mdi:water-percent
    initial: 35

  plants_threshold_potus:
    name: Soglia sete Potus
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    mode: box
    icon: mdi:water-percent
    initial: 30

  plants_threshold_stella_di_natale:
    name: Soglia sete Stella di Natale
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    mode: box
    icon: mdi:water-percent
    initial: 30

template:
  - binary_sensor:
      - name: "Plant thirsty TS piccolo"
        unique_id: plant_thirsty_ts_piccolo
        device_class: problem
        state: >
          {{
            states('sensor.plantsensor_ts_piccolo_soil_moisture') | float(999)
            < states('input_number.plants_threshold_ts_piccolo') | float(35)
          }}
        attributes:
          plant_name: "Terrazzo Salotto - vasi piccoli"
          moisture: "{{ states('sensor.plantsensor_ts_piccolo_soil_moisture') }}"
          threshold: "{{ states('input_number.plants_threshold_ts_piccolo') }}"

      - name: "Plant thirsty TS grande"
        unique_id: plant_thirsty_ts_grande
        device_class: problem
        state: >
          {{
            states('sensor.plantsensor_ts_grande_soil_moisture') | float(999)
            < states('input_number.plants_threshold_ts_grande') | float(35)
          }}
        attributes:
          plant_name: "Terrazzo Salotto - vasi grandi"
          moisture: "{{ states('sensor.plantsensor_ts_grande_soil_moisture') }}"
          threshold: "{{ states('input_number.plants_threshold_ts_grande') }}"

      - name: "Plant thirsty TCM piccolo"
        unique_id: plant_thirsty_tcm_piccolo
        device_class: problem
        state: >
          {{
            states('sensor.plantsensor_tcm_piccolo_soil_moisture') | float(999)
            < states('input_number.plants_threshold_tcm_piccolo') | float(35)
          }}
        attributes:
          plant_name: "Terrazzo Camera Matrimoniale - vasi piccoli"
          moisture: "{{ states('sensor.plantsensor_tcm_piccolo_soil_moisture') }}"
          threshold: "{{ states('input_number.plants_threshold_tcm_piccolo') }}"

      - name: "Plant thirsty TCM grande"
        unique_id: plant_thirsty_tcm_grande
        device_class: problem
        state: >
          {{
            states('sensor.plantsensor_tcm_grande_soil_moisture') | float(999)
            < states('input_number.plants_threshold_tcm_grande') | float(35)
          }}
        attributes:
          plant_name: "Terrazzo Camera Matrimoniale - vasi grandi"
          moisture: "{{ states('sensor.plantsensor_tcm_grande_soil_moisture') }}"
          threshold: "{{ states('input_number.plants_threshold_tcm_grande') }}"

      - name: "Plant thirsty Potus"
        unique_id: plant_thirsty_potus
        device_class: problem
        state: >
          {{
            states('sensor.plantsensor_potus_soil_moisture') | float(999)
            < states('input_number.plants_threshold_potus') | float(30)
          }}
        attributes:
          plant_name: "Potus"
          moisture: "{{ states('sensor.plantsensor_potus_soil_moisture') }}"
          threshold: "{{ states('input_number.plants_threshold_potus') }}"

      - name: "Plant thirsty Stella di Natale"
        unique_id: plant_thirsty_stella_di_natale
        device_class: problem
        state: >
          {{
            states('sensor.plantsensor_stella_di_natale_soil_moisture') | float(999)
            < states('input_number.plants_threshold_stella_di_natale') | float(30)
          }}
        attributes:
          plant_name: "Stella di Natale"
          moisture: "{{ states('sensor.plantsensor_stella_di_natale_soil_moisture') }}"
          threshold: "{{ states('input_number.plants_threshold_stella_di_natale') }}"

  - sensor:
      - name: "Plants thirsty count"
        unique_id: plants_thirsty_count
        icon: mdi:flower-alert
        unit_of_measurement: "piante"
        state: >
          {{
            [
              states('binary_sensor.plant_thirsty_ts_piccolo'),
              states('binary_sensor.plant_thirsty_ts_grande'),
              states('binary_sensor.plant_thirsty_tcm_piccolo'),
              states('binary_sensor.plant_thirsty_tcm_grande'),
              states('binary_sensor.plant_thirsty_potus'),
              states('binary_sensor.plant_thirsty_stella_di_natale')
            ] | select('eq', 'on') | list | count
          }}

      - name: "Plants thirsty list"
        unique_id: plants_thirsty_list
        icon: mdi:format-list-bulleted
        state: >
          {% set thirsty = [] %}

          {% if is_state('binary_sensor.plant_thirsty_ts_piccolo', 'on') %}
            {% set thirsty = thirsty + ['Terrazzo Salotto - vasi piccoli'] %}
          {% endif %}
          {% if is_state('binary_sensor.plant_thirsty_ts_grande', 'on') %}
            {% set thirsty = thirsty + ['Terrazzo Salotto - vasi grandi'] %}
          {% endif %}
          {% if is_state('binary_sensor.plant_thirsty_tcm_piccolo', 'on') %}
            {% set thirsty = thirsty + ['Terrazzo Camera Matrimoniale - vasi piccoli'] %}
          {% endif %}
          {% if is_state('binary_sensor.plant_thirsty_tcm_grande', 'on') %}
            {% set thirsty = thirsty + ['Terrazzo Camera Matrimoniale - vasi grandi'] %}
          {% endif %}
          {% if is_state('binary_sensor.plant_thirsty_potus', 'on') %}
            {% set thirsty = thirsty + ['Potus'] %}
          {% endif %}
          {% if is_state('binary_sensor.plant_thirsty_stella_di_natale', 'on') %}
            {% set thirsty = thirsty + ['Stella di Natale'] %}
          {% endif %}

          {{ thirsty | join(', ') if thirsty | count > 0 else 'None' }}
