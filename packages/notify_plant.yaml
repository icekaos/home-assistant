input_number:
  plants_threshold_ts:
    name: Soglia sete TS
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    mode: box
    icon: mdi:water-percent

  plants_weight_ts_piccolo:
    name: Peso vasi piccoli TS
    min: 0
    max: 1
    step: 0.05
    mode: box
    icon: mdi:scale-balance

  plants_threshold_tcm:
    name: Soglia sete TCM
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    mode: box
    icon: mdi:water-percent

  plants_weight_tcm_piccolo:
    name: Peso vasi piccoli TCM
    min: 0
    max: 1
    step: 0.05
    mode: box
    icon: mdi:scale-balance

  plants_threshold_potus:
    name: Soglia sete Potus
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    mode: box
    icon: mdi:water-percent

  plants_threshold_stella_di_natale:
    name: Soglia sete Stella di Natale
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    mode: box
    icon: mdi:water-percent

template:
  - binary_sensor:
      - name: "Plant thirsty TS"
        unique_id: plant_thirsty_ts
        device_class: problem
        state: >
          {{
            states('sensor.plant_moisture_ts') | float(999)
            < states('input_number.plants_threshold_ts') | float(35)
          }}
        attributes:
          plant_name: "Terrazzo Salotto"
          moisture: "{{ states('sensor.plant_moisture_ts') }}"
          threshold: "{{ states('input_number.plants_threshold_ts') }}"

      - name: "Plant thirsty TCM"
        unique_id: plant_thirsty_tcm
        device_class: problem
        state: >
          {{
            states('sensor.plant_moisture_tcm') | float(999)
            < states('input_number.plants_threshold_tcm') | float(35)
          }}
        attributes:
          plant_name: "Terrazzo Camera Matrimoniale"
          moisture: "{{ states('sensor.plant_moisture_tcm') }}"
          threshold: "{{ states('input_number.plants_threshold_tcm') }}"

      - name: "Plant thirsty Potus"
        unique_id: plant_thirsty_potus
        device_class: problem
        state: >
          {{
            states('sensor.plantsensor_potus_soil_moisture') | float(999)
            < states('input_number.plants_threshold_potus') | float(30)
          }}
        attributes:
          plant_name: "Potus"
          moisture: "{{ states('sensor.plantsensor_potus_soil_moisture') }}"
          threshold: "{{ states('input_number.plants_threshold_potus') }}"

      - name: "Plant thirsty Stella di Natale"
        unique_id: plant_thirsty_stella_di_natale
        device_class: problem
        state: >
          {{
            states('sensor.plantsensor_stella_di_natale_soil_moisture') | float(999)
            < states('input_number.plants_threshold_stella_di_natale') | float(30)
          }}
        attributes:
          plant_name: "Stella di Natale"
          moisture: "{{ states('sensor.plantsensor_stella_di_natale_soil_moisture') }}"
          threshold: "{{ states('input_number.plants_threshold_stella_di_natale') }}"

  - sensor:
      - name: "Plant moisture TS"
        unique_id: plant_moisture_ts
        device_class: moisture
        state_class: measurement
        unit_of_measurement: "%"
        icon: mdi:water-percent
        state: >
          {% set small = states('sensor.plantsensor_ts_piccolo_soil_moisture') | float(none) %}
          {% set large = states('sensor.plantsensor_ts_grande_soil_moisture') | float(none) %}
          {% set weight = states('input_number.plants_weight_ts_piccolo') | float(0.7) %}
          {% if small is none or large is none %}
            unavailable
          {% else %}
            {{ (small * weight + large * (1 - weight)) | round(1) }}
          {% endif %}
        attributes:
          plant_name: "Terrazzo Salotto"
          small_pot_moisture: "{{ states('sensor.plantsensor_ts_piccolo_soil_moisture') }}"
          large_pot_moisture: "{{ states('sensor.plantsensor_ts_grande_soil_moisture') }}"
          small_pot_weight: "{{ states('input_number.plants_weight_ts_piccolo') }}"

      - name: "Plant moisture TCM"
        unique_id: plant_moisture_tcm
        device_class: moisture
        state_class: measurement
        unit_of_measurement: "%"
        icon: mdi:water-percent
        state: >
          {% set small = states('sensor.plantsensor_tcm_piccolo_soil_moisture') | float(none) %}
          {% set large = states('sensor.plantsensor_tcm_grande_soil_moisture') | float(none) %}
          {% set weight = states('input_number.plants_weight_tcm_piccolo') | float(0.7) %}
          {% if small is none or large is none %}
            unavailable
          {% else %}
            {{ (small * weight + large * (1 - weight)) | round(1) }}
          {% endif %}
        attributes:
          plant_name: "Terrazzo Camera Matrimoniale"
          small_pot_moisture: "{{ states('sensor.plantsensor_tcm_piccolo_soil_moisture') }}"
          large_pot_moisture: "{{ states('sensor.plantsensor_tcm_grande_soil_moisture') }}"
          small_pot_weight: "{{ states('input_number.plants_weight_tcm_piccolo') }}"

      - name: "Plants thirsty count"
        unique_id: plants_thirsty_count
        icon: mdi:flower-alert
        unit_of_measurement: "piante"
        state: >
          {{
            [
              states('binary_sensor.plant_thirsty_ts'),
              states('binary_sensor.plant_thirsty_tcm'),
              states('binary_sensor.plant_thirsty_potus'),
              states('binary_sensor.plant_thirsty_stella_di_natale')
            ] | select('eq', 'on') | list | count
          }}

      - name: "Plants thirsty list"
        unique_id: plants_thirsty_list
        icon: mdi:format-list-bulleted
        state: >
          {% set thirsty = [] %}

          {% if is_state('binary_sensor.plant_thirsty_ts', 'on') %}
            {% set thirsty = thirsty + ['Terrazzo Salotto'] %}
          {% endif %}
          {% if is_state('binary_sensor.plant_thirsty_tcm', 'on') %}
            {% set thirsty = thirsty + ['Terrazzo Camera Matrimoniale'] %}
          {% endif %}
          {% if is_state('binary_sensor.plant_thirsty_potus', 'on') %}
            {% set thirsty = thirsty + ['Potus'] %}
          {% endif %}
          {% if is_state('binary_sensor.plant_thirsty_stella_di_natale', 'on') %}
            {% set thirsty = thirsty + ['Stella di Natale'] %}
          {% endif %}

          {{ thirsty | join(', ') if thirsty | count > 0 else 'None' }}
